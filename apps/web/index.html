<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- SVG favicon (Civil Defense mark). Replaces a dangling /favicon.ico ref that
         404'd on every page load (dinged Lighthouse best-practices). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Zoomable by default (a11y: public site + staff app must pinch-zoom). Display
         routes re-apply the kiosk lock (no user scaling) at runtime via DisplayCanvas,
         so always-on screens still get it without penalising the rest of the app. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <!-- VT323 + Share Tech Mono (docs/01). Loaded as a render-blocking stylesheet with
         preconnect: this fetches the font CSS (and, right behind it, the font files) at
         the highest priority so the webfont arrives BEFORE most content paints —
         minimising the font-swap layout shift (CLS). An async/deferred load was tried
         and measured WORSE for CLS here (it delays the swap until after long pages have
         painted). `display=swap` keeps text visible in the fallback while the font loads.
         DECISION: the residual CLS (~0.1) is font-swap on VT323 headings; the robust fix
         is self-hosting the woff2 with a size-adjust fallback (deferred — needs the font
         files vendored, out of scope for this pass). The dominant perf problem (the
         ~828 KB JS bundle) is solved by route-level code splitting (see App.tsx). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <title>BUNKER UNIFIED OS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
